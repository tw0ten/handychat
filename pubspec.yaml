name: handychat
description: "chat for mobile"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_colorpicker: ^1.0.3
  provider: ^6.0.3
  firebase_core: ^3.1.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/cat.png
  fonts:
    - family: JetBrains Mono
      fonts:
        - asset: assets/JetBrainsMono-Regular.ttf